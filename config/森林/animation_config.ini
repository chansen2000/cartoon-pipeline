[bg.global]
camera_pan_speed_pxs = 8        ; 整体摄像机速度像素/秒(可后续调)
default_sway_amplitude_01 = 50  ; 默认摆动幅度 0.1°
default_sway_duration_ms = 3000

[bg.l1_background]
sway_enable = false
parallax_ratio_override = -1    ; -1 表示不 override, 用 JSON 计算值

[bg.l2_trees01]
sway_enable = false
parallax_ratio_override = -1

[bg.l3_bush01]
sway_enable = true
sway_amplitude_01 = 50
sway_duration_ms = 3000
parallax_ratio_override = -1

[bg.l4_trees02]
sway_enable = false
parallax_ratio_override = -1

[bg.l5_trees03]
sway_enable = false
parallax_ratio_override = -1

[bg.l6_bush02]
sway_enable = true
sway_amplitude_01 = 80
sway_duration_ms = 2500
parallax_ratio_override = -1

[bg.l7_ground]
sway_enable = false
parallax_ratio_override = 100   ; 前景全速跟镜头(可保留 JSON 默认 1.0=100,二选一)
