[global]
default_skin = C01
log_mem_kb_threshold = 28

[idle_script]
enable = true
parts = eye,tail,hat
gap_ms = 800
shuffle = true

[part.eye]
enable = true
anim_type = spin
duration_ms = 800
amplitude = 3600          ; 0.1° 单位,360°

[part.tail]
enable = true
anim_type = wag
duration_ms = 600
amplitude = 150

[part.hat]
enable = true
anim_type = bounce
duration_ms = 500
amplitude = 20            ; 像素位移

[action.idle]
enable = true
frame_count = 20
fps = 24
loop = false
asset_prefix = pngseq_C01_idle

[action.walk]
enable = true
frame_count = 20
fps = 24
loop = false
asset_prefix = pngseq_C01_walk

[action.jump]
enable = true
frame_count = 20
fps = 30
loop = false
asset_prefix = pngseq_C01_jump

[action.fly]
enable = true
frame_count = 20
fps = 24
loop = false
asset_prefix = pngseq_C01_fly

[action.hit]
enable = true
frame_count = 50
fps = 30
loop = false
asset_prefix = pngseq_C01_hit

[action.roll]
enable = true
frame_count = 8
fps = 20
loop = false
asset_prefix = pngseq_C01_roll

[action.dead]
enable = true
frame_count = 45
fps = 24
loop = false
asset_prefix = pngseq_C01_dead

[action.stuned]
enable = true
frame_count = 24
fps = 24
loop = true
asset_prefix = pngseq_C01_stuned

[action.throwing]
enable = true
frame_count = 40
fps = 24
loop = false
asset_prefix = pngseq_C01_throwing

[bg]
enable_sway = true
sway_amplitude_01 = 50
sway_duration_ms = 3000
